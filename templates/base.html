<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}E-Sports Manager{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0a0c14;
      --card:     #111420;
      --border:   #1e2340;
      --accent:   #00f0ff;
      --accent2:  #7b2fff;
      --red:      #ff3860;
      --green:    #00e676;
      --gold:     #ffd700;
      --text:     #e0e6ff;
      --muted:    #5a6080;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Exo 2', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }
    /* ── Sidebar ── */
    nav {
      width: 220px; min-height: 100vh;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 0 0 24px;
      position: fixed; top: 0; left: 0; bottom: 0;
      z-index: 100;
    }
    .nav-logo {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.4rem; font-weight: 700;
      color: var(--accent);
      text-shadow: 0 0 18px var(--accent);
      padding: 28px 20px 24px;
      border-bottom: 1px solid var(--border);
      letter-spacing: 2px;
    }
    .nav-logo span { color: var(--accent2); }
    nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 20px;
      color: var(--muted);
      text-decoration: none;
      font-size: .9rem; font-weight: 600;
      transition: all .2s;
      border-left: 3px solid transparent;
    }
    nav a:hover, nav a.active {
      color: var(--accent);
      background: rgba(0,240,255,.06);
      border-left-color: var(--accent);
    }
    nav a .icon { font-size: 1.1rem; width: 20px; text-align: center; }
    /* ── Main ── */
    main {
      margin-left: 220px;
      flex: 1; padding: 32px 36px;
    }
    h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 2rem; font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 24px;
      color: #fff;
    }
    h1 .hl { color: var(--accent); }
    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .card-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem; font-weight: 600;
      color: var(--accent);
      letter-spacing: 1px;
      margin-bottom: 16px;
    }
    /* ── Stat Cards ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4,1fr);
      gap: 16px; margin-bottom: 24px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 24px;
      position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .stat-card .label { font-size: .78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .stat-card .value {
      font-family: 'Rajdhani', sans-serif;
      font-size: 2.2rem; font-weight: 700; color: #fff;
      margin-top: 4px; line-height: 1;
    }
    .stat-card .icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-size: 2.2rem; opacity: .15; }
    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    thead tr { border-bottom: 2px solid var(--accent); }
    th {
      font-family: 'Rajdhani', sans-serif;
      text-align: left; padding: 10px 12px;
      color: var(--accent); font-size: .8rem;
      letter-spacing: 1px; text-transform: uppercase;
    }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    tr:hover td { background: rgba(0,240,255,.04); }
    /* ── Badge ── */
    .badge {
      display: inline-block; padding: 2px 10px;
      border-radius: 20px; font-size: .75rem; font-weight: 600;
    }
    .badge-blue  { background: rgba(0,240,255,.15); color: var(--accent); border: 1px solid rgba(0,240,255,.3); }
    .badge-purple{ background: rgba(123,47,255,.2);  color: #b388ff; border: 1px solid rgba(123,47,255,.4); }
    .badge-red   { background: rgba(255,56,96,.15);  color: var(--red); border: 1px solid rgba(255,56,96,.3); }
    .badge-green { background: rgba(0,230,118,.15);  color: var(--green); border: 1px solid rgba(0,230,118,.3); }
    .badge-gold  { background: rgba(255,215,0,.15);  color: var(--gold); border: 1px solid rgba(255,215,0,.3); }
    /* ── Buttons ── */
    .btn {
      padding: 7px 16px; border-radius: 6px;
      font-family: 'Exo 2', sans-serif; font-size: .82rem; font-weight: 600;
      cursor: pointer; border: none; text-decoration: none;
      display: inline-flex; align-items: center; gap: 6px;
      transition: all .2s;
    }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { box-shadow: 0 0 16px var(--accent); }
    .btn-danger  { background: transparent; color: var(--red); border: 1px solid var(--red); }
    .btn-danger:hover { background: var(--red); color: #fff; }
    .btn-edit    { background: transparent; color: var(--accent2); border: 1px solid var(--accent2); }
    .btn-edit:hover { background: var(--accent2); color: #fff; }
    .btn-sm { padding: 4px 10px; font-size: .78rem; }
    /* ── Forms ── */
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 12px; }
    input, select {
      background: #0d0f1a; border: 1px solid var(--border);
      color: var(--text); border-radius: 6px;
      padding: 8px 12px; font-family: 'Exo 2', sans-serif;
      font-size: .85rem; width: 100%;
      transition: border-color .2s;
    }
    input:focus, select:focus { outline: none; border-color: var(--accent); }
    label { font-size: .78rem; color: var(--muted); display: block; margin-bottom: 4px; }
    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.7); z-index: 999;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 28px; min-width: 480px; max-width: 95vw;
      position: relative;
    }
    .modal h2 {
      font-family: 'Rajdhani', sans-serif;
      color: var(--accent); font-size: 1.3rem;
      margin-bottom: 20px; letter-spacing: 1px;
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: none; border: none; color: var(--muted);
      font-size: 1.3rem; cursor: pointer;
    }
    .modal-close:hover { color: var(--red); }
    /* ── Placement colors ── */
    .place-1 { color: var(--gold); font-weight: 700; }
    .place-2 { color: #c0c0c0; font-weight: 700; }
    .place-3 { color: #cd7f32; font-weight: 700; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .scrollable { overflow-x: auto; }
  </style>
</head>
<body>
<nav>
  <div class="nav-logo">⚡ E-SPORTS<br><span>MANAGER</span></div>
  <a href="{{ url_for('dashboard') }}"   class="{{ 'active' if request.endpoint=='dashboard' }}">   <span class="icon">📊</span> Dashboard</a>
  <a href="{{ url_for('teams') }}"       class="{{ 'active' if request.endpoint=='teams' }}">       <span class="icon">🛡️</span> Teams</a>
  <a href="{{ url_for('players') }}"     class="{{ 'active' if request.endpoint=='players' }}">     <span class="icon">🎮</span> Players</a>
  <a href="{{ url_for('gear') }}"        class="{{ 'active' if request.endpoint=='gear' }}">        <span class="icon">🖱️</span> Gear</a>
  <a href="{{ url_for('tournaments') }}" class="{{ 'active' if request.endpoint=='tournaments' }}"> <span class="icon">🏆</span> Tournaments</a>
  <a href="{{ url_for('results') }}"     class="{{ 'active' if request.endpoint=='results' }}">     <span class="icon">📈</span> Match Results</a>
</nav>
<main>
  {% block content %}{% endblock %}
</main>

<script>
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
// Close on overlay click
document.querySelectorAll('.modal-overlay').forEach(el =>
  el.addEventListener('click', e => { if(e.target === el) el.classList.remove('open'); })
);
</script>
</body>
</html>
